<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 · Seite nicht gefunden — ABEC Fassadenbau GmbH</title>

  <!-- All relative paths resolve against this base.
       When migrating to a custom domain at the root, change to <base href="/" />. -->
  <base href="/abec/" />

  <link rel="icon" type="image/png" href="assets/logo-abec.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 'abec-red': '#E30613', 'abec-black': '#000000' },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans:    ['Inter', 'Helvetica Neue', 'system-ui', 'sans-serif'],
          },
          letterSpacing: { 'eyebrow': '0.18em' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="font-sans text-white antialiased bg-abec-black">
  <main id="main" class="relative min-h-screen flex flex-col items-center justify-center text-center px-6 py-20 overflow-hidden">
    <!-- Background accents -->
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute -top-32 -right-24 w-[28rem] h-[28rem] rounded-full bg-abec-red/25 blur-[140px]"></div>
      <div class="absolute -bottom-32 -left-24 w-[24rem] h-[24rem] rounded-full bg-abec-red/15 blur-[120px]"></div>
    </div>

    <div class="relative z-10 max-w-xl mx-auto">
      <a href="./" aria-label="ABEC Fassadenbau – Startseite" class="inline-block mb-16">
        <img src="assets/logo-abec.png" alt="ABEC Fassadenbau GmbH" class="notfound-logo h-12 w-auto" />
      </a>
      <p class="text-white/70 text-xs tracking-eyebrow uppercase font-medium mb-6 flex items-center justify-center gap-3">
        <span class="inline-block w-10 h-px bg-abec-red"></span>
        Fehler 404
        <span class="inline-block w-10 h-px bg-abec-red"></span>
      </p>
      <h1 class="font-display text-6xl sm:text-7xl lg:text-8xl font-light leading-[1] mb-6">
        404
      </h1>
      <h2 class="font-display text-2xl sm:text-3xl font-light mb-6">
        Seite nicht gefunden
      </h2>
      <p class="text-white/80 text-base lg:text-lg leading-relaxed mb-10">
        Die von Ihnen gesuchte Seite existiert nicht oder wurde verschoben. Kehren Sie zur Startseite zurück oder nehmen Sie Kontakt mit uns auf.
      </p>
      <div class="flex flex-wrap justify-center gap-2 sm:gap-4">
        <a href="./" class="btn-primary">
          <span class="btn-label">Zurück zur Startseite</span>
          <span class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </span>
        </a>
        <a href="kontakt.html" class="btn-outline">Kontakt</a>
      </div>
    </div>
  </main>
</body>
</html>
